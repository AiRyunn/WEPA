name: translation
common:
  seed: 42
  device: "0"
  dataset_size: 200
  evaluate_scores: true
  batch_size: 8
  max_source_length: 512
  max_target_length: 512
  max_retokenized_length: 512
  max_lengths: [5, 10, 15, 20, 25, 30, 35, 40, 45, 50]
  languages: ["fr", "ru"]
  watermarkers: ["unbiased"]
  n_samples: 10000
  upperbound: false
  n_examples: 3
  shard_index: 0
  num_shards: 1
  output_dir: artifacts/output/translation
parameters:
- model_name: meta-llama/Llama-3.2-3B
- model_name: mistralai/Mistral-7B-v0.3
